server:
  port: 8080

spring:
  application:
    name: mall-gateway
  cloud:
    gateway:
      routes:
        - id: mall-user
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**,/api/admin/user/**,/feign/user/**

        - id: mall-product
          uri: http://localhost:8082
          predicates:
            - Path=/api/product/**,/api/banner/**,/api/admin/product/**,/api/admin/category/**,/api/admin/banner/**,/feign/product/**

        - id: mall-order
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**,/api/order/**,/api/admin/order/**,/api/admin/dashboard/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
